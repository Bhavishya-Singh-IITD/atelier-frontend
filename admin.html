<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Studio Portal | Atelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-container { max-width: 600px; margin: 60px auto; padding: 40px; background: #fff; border: 1px solid #eee; }
    .admin-title { font-family: 'Fraunces', serif; font-size: 32px; margin-bottom: 5px; }
    .upload-form { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
    .upload-form label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .upload-form input, .upload-form select, .upload-form textarea { padding: 12px; border: 1px solid #ddd; outline: none; font-family: inherit; font-size: 14px; }
    .upload-form input:focus, .upload-form select:focus, .upload-form textarea:focus { border-color: #1a1a1a; }
  </style>
</head>
<body style="background: #faf9f6;">
  
  <script src="js/header.js"></script>

  <main>
    <div class="admin-container">
      <h1 class="admin-title">Publish Artwork</h1>
      <p style="color: #666;">Upload an original piece directly to the live gallery storefront collection.</p>

      <form class="upload-form" id="admin-upload-form">
        <label for="art-name">Artwork Title</label>
        <input type="text" id="art-name" required placeholder="e.g., Midnight Reflections">

        <label for="art-category">Collection Category</label>
        <select id="art-category" required>
          <option value="Original Art">Original Paintings</option>
          <option value="Art Plates">Art Plates</option>
          <option value="Art Prints">Art Prints</option>
        </select>

        <label for="art-price">Retail Price (USD)</label>
        <input type="number" id="art-price" required step="0.01" placeholder="e.g., 450.00">

        <label for="art-desc">Artistic Description</label>
        <textarea id="art-desc" rows="4" placeholder="Describe the medium, inspiration, canvas specs..."></textarea>

        <label for="art-file">Select Image File</label>
        <input type="file" id="art-file" accept="image/*" required>

        <button type="submit" class="btn btn-dark" style="margin-top: 10px;" id="upload-btn">Publish to Gallery</button>
      </form>
    </div>
  </main>

  <script src="js/script.js"></script>
  <script src="js/footer.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('admin-upload-form');
      const uploadBtn = document.getElementById('upload-btn');
      const token = localStorage.getItem('atelierToken');

      // Intercept instantly if a non-logged-in session attempts to parse the layout
      if (!token) {
        if (window.showToast) {
          window.showToast("Unauthorized! Redirecting to credentials gateway...", true);
        }
        setTimeout(() => { window.location.href = 'signin.html'; }, 1500);
        return;
      }

      form.onsubmit = async (e) => {
        e.preventDefault();

        uploadBtn.innerText = "Uploading to Media Engine...";
        uploadBtn.style.opacity = "0.7";
        uploadBtn.style.pointerEvents = "none";

        // Multi-part form data preparation for image files
        const formData = new FormData();
        formData.append('name', document.getElementById('art-name').value);
        formData.append('category', document.getElementById('art-category').value);
        formData.append('price', document.getElementById('art-price').value);
        formData.append('description', document.getElementById('art-desc').value);
        formData.append('image', document.getElementById('art-file').files[0]);

        try {
          const response = await fetch('https://atelier-api-x7yz.onrender.com/products/add', {
            method: 'POST',
            headers: { 
              'Authorization': `Bearer ${token}` 
            },
            body: formData 
          });

          const data = await response.json();

          if (response.ok) {
            if (window.showToast) {
              window.showToast("🎉 Success! Artwork listed on storefront.");
            }
            form.reset();
          } else {
            if (window.showToast) {
              window.showToast("Security Error: " + (data.message || "Upload rejected."), true);
            }
          }
        } catch (error) {
          console.error(error);
          if (window.showToast) {
            window.showToast("Server network handshake failed.", true);
          }
        } finally {
          uploadBtn.innerText = "Publish to Gallery";
          uploadBtn.style.opacity = "1";
          uploadBtn.style.pointerEvents = "auto";
        }
      };
    });
  </script>
</body>
</html>
