<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist | Atelier</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .page-wrap { max-width: 1080px; margin: 0 auto; padding: 56px 24px 80px; }
    .page-title { font-family: var(--font-display); font-size: 38px; font-weight: 400; margin-bottom: 6px; }
    .page-sub   { color: var(--color-muted); margin-bottom: 40px; font-size: 14px; }

    .wish-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-bottom: 48px;
    }
    @media (max-width: 900px)  { .wish-grid { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 640px)  { .wish-grid { grid-template-columns: repeat(2,1fr); } }

    .wish-card {
      border: 1px solid var(--color-line);
      border-radius: 4px;
      overflow: hidden;
      background: white;
      transition: border-color 0.2s;
    }
    .wish-card:hover { border-color: #aaa; }

    .wish-thumb {
      width: 100%; aspect-ratio: 3/4;
      overflow: hidden; background: var(--color-cream);
    }
    .wish-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .wish-card:hover .wish-thumb img { transform: scale(1.04); }

    .wish-info { padding: 14px; }
    .wish-name  { font-size: 13px; font-weight: 500; line-height: 1.35; margin-bottom: 6px; }
    .wish-price { font-size: 14px; color: var(--color-accent); font-weight: 600; margin-bottom: 12px; }

    .wish-btns { display: flex; gap: 8px; }

    .btn-add-cart {
      flex: 1; padding: 9px 10px; font-size: 11px; letter-spacing: 0.07em;
      border: none; background: #0066ff; color: white;
      cursor: pointer; border-radius: 2px; font-family: var(--font-body);
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      transition: background 0.25s;
    }
    .btn-add-cart svg { width: 13px; height: 13px; stroke: white; fill: none; stroke-width: 2; }
    .btn-add-cart:hover { background: #0052cc; }
    .btn-add-cart.in-cart {
      background: #10b981;
    }
    .btn-add-cart.in-cart:hover { background: #059669; }

    .btn-remove-wish {
      padding: 9px 12px; font-size: 11px; letter-spacing: 0.07em;
      border: 1px solid #f0a0a0; color: #c00; background: white;
      cursor: pointer; border-radius: 2px; font-family: var(--font-body);
      transition: background 0.2s;
    }
    .btn-remove-wish:hover { background: #ffe0e0; }

    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-state svg { width: 72px; height: 72px; opacity: 0.2; margin-bottom: 20px; }
    .empty-state h2 { font-family: var(--font-display); font-size: 28px; margin-bottom: 10px; }
    .empty-state p  { color: var(--color-muted); margin-bottom: 28px; }

    .page-cta { text-align: center; border-top: 1px solid var(--color-line); padding-top: 28px; }
    .page-cta a { margin: 0 8px; }
  </style>
</head>
<body>
  <script src="js/header.js"></script>

  <main>
    <div class="page-wrap">
      <h1 class="page-title">My Wishlist</h1>
      <p class="page-sub">Your saved favourite artworks</p>
      <div id="wish-body"></div>
    </div>
  </main>

  <script src="js/script.js"></script>
  
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const root = document.getElementById('wish-body');

    function render() {
      // 1. Get real-time data from localStorage maps
      const wishData = JSON.parse(localStorage.getItem('wishlist') || '[]');
      const wishMap = new Map(wishData);

      const cartData = JSON.parse(localStorage.getItem('cart') || '[]');
      const cartMap = new Map(cartData);

      // 2. Handle Empty State
      if (wishMap.size === 0) {
        root.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <h2>Your wishlist is empty</h2>
            <p>Browse artworks and click the ❤ to save favourites</p>
            <a href="shop.html" class="btn btn-dark">Explore Shop</a>
          </div>`;
        return;
      }

      // 3. Render Cards
      let cards = '';
      wishMap.forEach((item, name) => {
        const price = item.price || 0;
        const img   = item.image || '';
        const inC   = cartMap.has(name);
        const safeName = name.replace(/'/g, "\\'");
        
        cards += `
          <div class="wish-card" data-name="${name}">
            <div class="wish-thumb">
              ${img ? `<img src="${img}" alt="${name}" onerror="this.parentElement.style.background='#e0d8d0'">` : ''}
            </div>
            <div class="wish-info">
              <div class="wish-name">${name}</div>
              <div class="wish-price">$${price.toFixed(2)}</div>
              <div class="wish-btns">
                <button class="btn-add-cart ${inC ? 'in-cart' : ''}" onclick="window.doAddCart('${safeName}', ${price}, '${img}', this)">
                  <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                  ${inC ? '✓ Added' : 'Add to Cart'}
                </button>
                <button class="btn-remove-wish" onclick="window.doRemoveWish('${safeName}')">Remove</button>
              </div>
            </div>
          </div>`;
      });

      root.innerHTML = `
        <div class="wish-grid">${cards}</div>
        <div class="page-cta">
          <a href="shop.html" class="btn btn-outline">Continue Shopping</a>
          <a href="cart.html"  class="btn btn-dark">View Cart</a>
        </div>`;
    }

    // 4. Logic Handlers
    window.doAddCart = (name, price, image, btn) => {
      const cartMap = new Map(JSON.parse(localStorage.getItem('cart') || '[]'));
      
      if (cartMap.has(name)) {
        cartMap.delete(name);
      } else {
        cartMap.set(name, { name, price, image });
      }
      
      localStorage.setItem('cart', JSON.stringify([...cartMap.entries()]));
      // Use reload to trigger script.js badges and MongoDB sync
      window.location.reload();
    };

    window.doRemoveWish = (name) => {
      const wishMap = new Map(JSON.parse(localStorage.getItem('wishlist') || '[]'));
      wishMap.delete(name);
      localStorage.setItem('wishlist', JSON.stringify([...wishMap.entries()]));
      window.location.reload();
    };

    // Delay render slightly to allow script.js to finish cloud loading
    setTimeout(render, 150);
  });
  </script>
</body>
</html>
