<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Collection Vault | Atelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .account-container { max-width: 900px; margin: 60px auto; padding: 0 20px; min-height: 60vh; }
    .account-header { border-bottom: 1px solid #eee; padding-bottom: 25px; margin-bottom: 40px; }
    .account-title { font-family: 'Fraunces', serif; font-size: 36px; margin: 0 0 5px 0; }
    .collector-email { font-family: 'Albert Sans', sans-serif; font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    
    .section-subtitle { font-family: 'Fraunces', serif; font-size: 22px; margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
    
    .order-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 25px; margin-bottom: 20px; transition: box-shadow 0.3s ease; }
    .order-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
    .order-meta-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #eee; padding-bottom: 15px; margin-bottom: 20px; font-size: 14px; }
    
    .order-id-badge { font-weight: 600; font-family: 'Albert Sans', sans-serif; background: #f5f5f5; padding: 4px 10px; border-radius: 2px; letter-spacing: 0.5px; }
    .order-status-tag { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 4px 12px; border-radius: 20px; }
    
    .purchased-items-list { display: flex; flex-direction: column; gap: 15px; }
    .purchased-item-thumb { width: 60px; height: 75px; object-fit: cover; border-radius: 2px; background: #fafafa; }
  </style>
</head>
<body style="background: #faf9f6;">
  
  <script src="js/header.js"></script>

  <main class="account-container">
    <header class="account-header">
      <h1 class="account-title">Collector Dashboard</h1>
      <div class="collector-email" id="collector-profile-email">Loading Collector Profile...</div>
    </header>

    <section aria-label="Purchase History Logs">
      <h2 class="section-subtitle">Your Art Acquisitions</h2>
      <div id="historical-orders-output">
        <p style="color:#888;">Fetching secure archival histories from MongoDB Cloud...</p>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
  <script src="js/footer.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const emailContainer = document.getElementById('collector-profile-email');
      const ordersOutput = document.getElementById('historical-orders-output');
      
      const storedEmail = localStorage.getItem('userEmail');
      const token = localStorage.getItem('atelierToken');

      // 🛡️ GATEKEEPER CHECK: Bounce unauthenticated traffic out immediately
      if (!token || !storedEmail) {
        if (window.showToast) window.showToast("Session missing. Routing to secure validation gateway...", true);
        setTimeout(() => { window.location.href = 'signin.html'; }, 1500);
        return;
      }

      // Display user email immediately on profile template view container
      emailContainer.textContent = `Premium Member Vault: ${storedEmail}`;

      try {
        // Query server to fetch user payload records securely
        const response = await fetch('https://atelier-api-x7yz.onrender.com/user/data', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ email: storedEmail })
        });

        if (!response.ok) throw new Error("Rejected data access handshake.");
        const profileData = await response.json();
        
        const trackingOrders = profileData.orders || [];

        // Catch edge-case states where profile user document contains clean empty logs arrays
        if (trackingOrders.length === 0) {
          ordersOutput.innerHTML = `
            <div style="text-align: center; padding: 60px 20px; border: 1px dashed #ccc; background:#fff;">
              <p style="color:#666; margin-bottom: 15px;">You haven't acquired any original wall art or prints yet.</p>
              <a href="shop.html" class="btn btn-dark" style="font-size:12px;">Browse Live Collections</a>
            </div>`;
          return;
        }

        // Reverse display so newest acquisitions array items populate at the top
        trackingOrders.reverse();

        // Map and render historical tracking cards cleanly into the workspace DOM
        ordersOutput.innerHTML = trackingOrders.map(order => {
          const orderDate = new Date(order.date).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
          });

          return `
            <div class="order-card">
              <div class="order-meta-row">
                <div>
                  <span class="order-id-badge">${order.orderId}</span>
                  <span style="color:#888; margin-left: 10px;">Acquired on ${orderDate}</span>
                </div>
                <div>
                  <span class="order-status-tag">${order.status || 'Processing'}</span>
                </div>
              </div>

              <div class="purchased-items-list">
                ${order.items.map(art => `
                  <div style="display: flex; align-items: center; gap: 15px; font-size: 15px;">
                    <img src="${art.image}" class="purchased-item-thumb" alt="${art.name}">
                    <div style="flex-grow: 1;">
                      <strong style="font-family: 'Fraunces', serif; font-size: 16px;">${art.name}</strong>
                      <div style="color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;">${art.category || 'Original Art'}</div>
                    </div>
                    <div style="font-weight: 500;">$${Number(art.price).toFixed(2)}</div>
                  </div>
                `).join('')}
              </div>

              <div style="text-align: right; margin-top: 20px; padding-top: 15px; border-top: 1px solid #f5f5f5; font-size: 15px;">
                <span style="color:#666;">Investment Total:</span> 
                <strong style="font-size: 18px; margin-left: 5px; color:#1a1a1a;">$${Number(order.totalAmount).toFixed(2)}</strong>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        console.error("Dashboard Render Pipeline Crash:", err);
        ordersOutput.innerHTML = `<p style="color:#ef4444;">Handshake timeout. Ensure local connection servers are up and active.</p>`;
      }
    });
  </script>
</body>
</html>
