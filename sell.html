<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell Your Art | Atelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=Albert+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .sell-container { max-width: 600px; margin: 80px auto; padding: 40px; background: #fff; border: 1px solid #eee; border-radius: 8px; }
    .sell-header { text-align: center; margin-bottom: 40px; }
    .sell-header h1 { font-family: 'Fraunces', serif; font-size: 2.5rem; margin-bottom: 10px; }
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: #666; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 16px; outline: none; }
    .form-group input:focus { border-color: #1a1a1a; }
    .submit-btn { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background 0.3s; font-family: inherit; }
    .submit-btn:hover { background: #333; }
    .submit-btn:disabled { background: #999; cursor: not-allowed; }
    #image-preview { width: 100%; height: 250px; border: 2px dashed #eee; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; overflow: hidden; border-radius: 4px; background: #fafafa; }
    #image-preview img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <script src="js/header.js"></script>

  <main class="container">
    <div class="sell-container">
      <div class="sell-header">
        <h1>List Your Artwork</h1>
        <p>Your masterpiece will be featured in the global Atelier gallery.</p>
      </div>

      <div id="image-preview">
        <span id="preview-text" style="color: #999;">No image selected</span>
      </div>

      <form id="uploadForm">
        <div class="form-group">
          <label for="artImage">Artwork Photo</label>
          <input type="file" id="artImage" name="image" accept="image/*" required>
        </div>

        <div class="form-group">
          <label for="artName">Title of Piece</label>
          <input type="text" id="artName" name="name" placeholder="e.g. Midnight in Delhi" required>
        </div>

        <div class="form-group">
          <label for="artPrice">Price (USD)</label>
          <input type="number" id="artPrice" name="price" placeholder="450" required>
        </div>

        <div class="form-group">
          <label for="artCategory">Category</label>
          <select id="artCategory" name="category">
            <option value="Abstract">Abstract</option>
            <option value="Landscape">Landscape</option>
            <option value="Portrait">Portrait</option>
            <option value="Modern">Modern Art</option>
            <option value="Canvas Art">Canvas Art</option>
          </select>
        </div>

        <div class="form-group">
          <label for="artDesc">Description</label>
          <textarea id="artDesc" name="description" rows="4" placeholder="Tell the story behind this painting..."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Post Artwork to Gallery</button>
      </form>
    </div>
  </main>

  <script src="js/script.js"></script>

  <script>
    const uploadForm = document.getElementById('uploadForm');
    const imageInput = document.getElementById('artImage');
    const previewContainer = document.getElementById('image-preview');
    const previewText = document.getElementById('preview-text');
    const submitBtn = document.getElementById('submitBtn');

    // 1. DYNAMIC PREVIEW
    imageInput.addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          previewContainer.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
        }
        reader.readAsDataURL(file);
      }
    });

    // 2. MULTIPART FORM SUBMISSION (Cloudinary + MongoDB)
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.textContent = "Uploading to Cloud...";
      submitBtn.disabled = true;

      const formData = new FormData(uploadForm);

      try {
        const response = await fetch('https://atelier-api-x7yz.onrender.com/products/add', {
          method: 'POST',
          body: formData // Body is FormData, no JSON.stringify needed
        });

        const data = await response.json();

        if (response.ok) {
          if (window.showToast) {
            window.showToast("Artwork listed successfully!");
          } else {
            alert("Artwork listed successfully!");
          }
          
          // Redirect to shop after toast is seen
          setTimeout(() => {
            window.location.href = 'shop.html';
          }, 2000);
        } else {
          alert("Upload failed: " + (data.message || "Unknown error"));
          submitBtn.textContent = "Post Artwork to Gallery";
          submitBtn.disabled = false;
        }
      } catch (error) {
        console.error("Connection Error:", error);
        alert("Cannot reach server. Is your backend running on port 5001?");
        submitBtn.textContent = "Post Artwork to Gallery";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
